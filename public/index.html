<!DOCTYPE html>
<html>

<head>

<title>Pattern Converter</title>

<style>

.progress{
width:400px;
height:25px;
background:#eee
}

.bar{
height:100%;
width:0%;
background:#4CAF50
}

</style>

</head>

<body>

<h2>Cross Stitch Converter</h2>

<input type="file" id="file">

<br><br>

Od: <input type="number" id="fromPage" value="1" min="1">
Do: <input type="number" id="toPage" value="1" min="1">
  
<br><br>
<select id="format">
<option value="pdf">PDF</option>
<option value="xsd">XSD</option>
</select>

<br><br>

<button onclick="upload()">Convert</button>

<br><br>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="stats">0 / 0 cells</div>

<script src="/socket.io/socket.io.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
window.pdfjsLib = window["pdfjs-dist/build/pdf"];
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script src="app.js"></script>

</body>

</html>
